<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow">

    <!-- Primary Meta Tags -->
    <title>%VITE_APP_NAME% | Discover &amp; share powerful AI prompts</title>
    <meta name="description" content="Where great AI prompts are shared. Discover, use and publish prompts for ChatGPT, Midjourney, Claude and more.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="%VITE_APP_NAME% | Discover & share powerful AI prompts">
    <meta property="og:description" content="Where great AI prompts are shared. Discover, use and publish prompts for ChatGPT, Midjourney, Claude and more.">
    <meta property="og:image" content="https://promptindex.io/images/other/og-image.jpeg">
    <meta property="og:site_name" content="PromptIndex.io">
    <meta property="og:locale" content="en">

    <!-- Twitter/X -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="%VITE_APP_NAME% | Discover & share powerful AI prompts">
    <meta property="twitter:description" content="Where great AI prompts are shared. Discover, use and publish prompts for ChatGPT, Midjourney, Claude and more.">

    <!-- Theme color for mobile browsers -->
    <meta x-ref="themeColor" name="theme-color" content="#101828">
    <meta x-ref="msTileColor" name="msapplication-TileColor" content="#101828">

    <!-- Mobile app config -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- Added favicons using realfavicongenerator.net -->
    <link rel="icon" type="image/png" href="/images/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="PromptIndex.io" />
    <link rel="manifest" href="/images/favicons/site.webmanifest" />

    <!-- Security headers -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
